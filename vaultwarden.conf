# /etc/nginx/sites-available/vaultwarden
#
# Reverse proxy for Vaultwarden running in Docker on 127.0.0.1:8080.
# TLS is terminated here; the backend speaks plain HTTP on the loopback only.

# Redirect any HTTP traffic to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Self-signed cert generated with:
    #   sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #       -keyout /etc/ssl/private/lab.key \
    #       -out    /etc/ssl/certs/lab.crt
    ssl_certificate     /etc/ssl/certs/lab.crt;
    ssl_certificate_key /etc/ssl/private/lab.key;

    # Modern TLS only
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Vaultwarden recommends a generous max body size for attachments
    client_max_body_size 128M;

    location / {
        proxy_pass http://127.0.0.1:8080;

        # Pass real client info to the backend, since it otherwise only
        # sees requests coming from 127.0.0.1 (Nginx itself).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Vaultwarden's live sync
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
