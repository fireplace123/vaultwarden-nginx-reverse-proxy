# Vaultwarden container definition.
#
# The 127.0.0.1 prefix on the port mapping is the important bit: it binds
# Vaultwarden to the loopback interface only, so the container is NOT
# reachable from outside the host. The only way in is through Nginx,
# which listens on :443 and proxies to this container.

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./vw-data:/data
    environment:
      # Disable signups after your account is created
      SIGNUPS_ALLOWED: "true"
      # Tell Vaultwarden it's behind a proxy so it generates correct URLs
      DOMAIN: "https://your-vm-ip"
